<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expenses</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-card card">
    <div class="rider-icon" style="font-size: 3.5rem; margin-bottom: 20px;">🏍️</div>
    <div class="logo">BMD</div>
    <p class="subtitle">Track. Ride. Earn.</p>
    <button onclick="login()" class="google-btn" aria-label="Login with Google">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwaa/google.svg" class="google-logo" alt="Google">
      Continue with Google
    </button>
  </div>
</div>

<div class="app">
  <header class="header">💰 Expenses</header>
  <main class="content">

    <!-- Add Expenses -->
    <div class="card">
      <form id="expenseForm">
        <div class="form-group">
          <label>Category</label>
          <select id="expenseCategory" style="width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border); border-radius: 16px; color: var(--text); font-family: inherit;">
            <option value="Food">Food</option>
            <option value="Maintenance">Maintenance</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount (₹)</label>
          <input type="number" id="expenseAmount" placeholder="Amount" required>
        </div>
        <button type="submit">Add Expense</button>
      </form>
    </div>

    <!-- Pie Chart -->
    <div class="card">
      <h3 style="margin-bottom: 15px;">Expense Distribution</h3>
      <div class="chart-container pie-container">
        <canvas id="expensePieChart"></canvas>
      </div>
    </div>

  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <i data-lucide="home"></i>
      <span>Home</span>
    </a>
    <a href="mileage.html" class="nav-item">
      <i data-lucide="fuel"></i>
      <span>Mileage</span>
    </a>
    <a href="expenses.html" class="nav-item active">
      <i data-lucide="wallet"></i>
      <span>Expenses</span>
    </a>
    <a href="insights.html" class="nav-item">
      <i data-lucide="bar-chart-3"></i>
      <span>Insights</span>
    </a>
  </nav>
</div>

<!-- Dependencies -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<!-- App logic (Modular) -->
<script type="module" src="app.js?v=1.5"></script>
</body>
</html>
