<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insights - BMD</title>
  <link rel="stylesheet" href="style.css?v=1.3">
</head>
<body>

<!-- Login Screen (Global) -->
<div class="login-screen" id="loginScreen">
  <div class="login-card card">
    <div class="rider-icon" style="font-size: 3.5rem; margin-bottom: 20px;">🏍️</div>
    <div class="logo">BMD</div>
    <p class="subtitle">Track. Ride. Earn.</p>
    <button onclick="login()" class="google-btn">
      <img src="https://www.gstatic.com/images/branding/googleg/1x/googleg_standard_color_128dp.png" class="google-logo" alt="Google">
      Continue with Google
    </button>
  </div>
</div>

<div class="app-container">
  <header class="header">
    <div class="logo">📊 Insights</div>
    <a href="settings.html" class="settings-btn" aria-label="Settings">
      <i data-lucide="settings"></i>
    </a>
  </header>

  <main class="content">
    <section id="insights-page" class="page-content">
      
      <!-- Smart Insights -->
      <div class="card glass-card">
        <h3 style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
          <i data-lucide="zap" style="color: var(--warning)"></i> Smart Insights
        </h3>
        <div id="insightList" class="insight-list">
          <!-- Insights injected here -->
        </div>
      </div>

      <!-- Comparison Chart -->
      <div class="card glass-card">
        <h3 style="margin-bottom: 15px; font-size: 1rem;">Earnings vs Expenses</h3>
        <div class="chart-container" style="height: 220px;">
          <canvas id="insightComparisonChart"></canvas>
        </div>
      </div>

      <!-- Financial Metrics Grid -->
      <div class="card glass-card">
        <h3 style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
          <i data-lucide="pie-chart" style="color: var(--primary)"></i> Key Metrics
        </h3>
        <div class="insights-grid" id="financial-metrics">
          <!-- Cards injected by JS -->
        </div>
      </div>

    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" id="nav-home">
      <i data-lucide="home"></i>
      <span>Home</span>
    </a>
    <a href="mileage.html" class="nav-item" id="nav-mileage">
      <i data-lucide="fuel"></i>
      <span>Mileage</span>
    </a>
    <a href="expense.html" class="nav-item" id="nav-expenses">
      <i data-lucide="wallet"></i>
      <span>Expenses</span>
    </a>
    <a href="insights.html" class="nav-item active" id="nav-insights">
      <i data-lucide="bar-chart-3"></i>
      <span>Insights</span>
    </a>
  </nav>
</div>

<!-- Dependencies -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script type="module" src="app.js?v=1.5"></script>
</body>
</html>
